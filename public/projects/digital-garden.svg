<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <pattern id="dg-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#C5BFB0" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#F5F0E8"/>
  <rect width="1200" height="675" fill="url(#dg-grid)"/>

  <!-- Edges -->
  <g stroke="#1A1A1A" stroke-width="1.8" opacity="0.75">
    <!-- From central orange node -->
    <line x1="430" y1="270" x2="303" y2="202"/>
    <line x1="430" y1="270" x2="493" y2="188"/>
    <line x1="430" y1="270" x2="530" y2="268"/>
    <line x1="430" y1="270" x2="372" y2="192"/>
    <line x1="430" y1="270" x2="353" y2="235"/>
    <line x1="430" y1="270" x2="342" y2="300"/>
    <line x1="430" y1="270" x2="444" y2="342"/>
    <!-- Secondary -->
    <line x1="303" y1="202" x2="372" y2="192"/>
    <line x1="303" y1="202" x2="263" y2="240"/>
    <line x1="303" y1="202" x2="320" y2="163"/>
    <line x1="342" y1="300" x2="263" y2="240"/>
    <line x1="342" y1="300" x2="265" y2="315"/>
    <line x1="342" y1="300" x2="444" y2="342"/>
    <line x1="530" y1="268" x2="572" y2="198"/>
    <line x1="530" y1="268" x2="558" y2="332"/>
    <line x1="493" y1="188" x2="572" y2="198"/>
    <line x1="493" y1="188" x2="533" y2="164"/>
    <line x1="444" y1="342" x2="484" y2="386"/>
    <line x1="263" y1="240" x2="265" y2="315"/>
  </g>

  <!-- Nodes (drawn after edges so they sit on top) -->

  <!-- Central large orange node -->
  <circle cx="430" cy="270" r="36" fill="#E84522" stroke="#1A1A1A" stroke-width="3"/>

  <!-- White / cream outline nodes -->
  <circle cx="303" cy="202" r="27" fill="#F5F0E8" stroke="#1A1A1A" stroke-width="2.5"/>
  <circle cx="493" cy="188" r="22" fill="#F5F0E8" stroke="#1A1A1A" stroke-width="2.5"/>
  <circle cx="372" cy="192" r="15" fill="#F5F0E8" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="353" cy="235" r="17" fill="#F5F0E8" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="263" cy="240" r="20" fill="#F5F0E8" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="265" cy="315" r="14" fill="#F5F0E8" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="320" cy="163" r="13" fill="#F5F0E8" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="572" cy="198" r="18" fill="#F5F0E8" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="558" cy="332" r="13" fill="#F5F0E8" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="444" cy="342" r="17" fill="#F5F0E8" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Purple nodes -->
  <circle cx="530" cy="268" r="26" fill="#7B2FBE" stroke="#1A1A1A" stroke-width="2.5"/>
  <circle cx="342" cy="300" r="21" fill="#7B2FBE" stroke="#1A1A1A" stroke-width="2.5"/>

  <!-- Small orange accent node -->
  <circle cx="533" cy="164" r="16" fill="#E84522" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Purple hexagon node -->
  <polygon
    points="484,364 503,375 503,397 484,408 465,397 465,375"
    fill="none" stroke="#7B2FBE" stroke-width="2.5"/>
</svg>
