<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <!-- Dark background -->
  <rect width="1200" height="675" fill="#0D1117"/>

  <!-- Subtle vignette gradient overlay -->
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020408" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- Nav bar -->
  <rect width="1200" height="64" fill="#0D1117"/>
  <line x1="0" y1="64" x2="1200" y2="64" stroke="#1E2733" stroke-width="1"/>
  <!-- Logo -->
  <text x="60" y="40" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700" fill="#FFFFFF" letter-spacing="0.3">Solon AI</text>
  <!-- Nav items -->
  <text x="800" y="40" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#8B949E">Features</text>
  <text x="896" y="40" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#8B949E">How it works</text>
  <text x="1020" y="40" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#8B949E">Pricing</text>
  <text x="1100" y="40" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#8B949E">Privacy</text>

  <!-- Status pill badge -->
  <rect x="401" y="116" width="398" height="38" rx="19" fill="#111827" stroke="#2A3A54" stroke-width="1.2"/>
  <circle cx="424" cy="135" r="5" fill="#6366F1"/>
  <text x="437" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#8B9EC9">Team Standards Dashboard — live March 2026</text>

  <!-- Main headline line 1 -->
  <text x="600" y="226" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="54" font-weight="800" fill="#FFFFFF">Your team's coding</text>
  <!-- "standards," in violet -->
  <text x="600" y="296" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="54" font-weight="800" fill="#818CF8">standards,</text>
  <!-- line 3 -->
  <text x="600" y="366" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="54" font-weight="800" fill="#FFFFFF">enforced automatically.</text>

  <!-- Subtext -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#6B7280">Define the rules your team actually cares about. Solon enforces</text>
  <text x="600" y="442" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#6B7280">them on every PR and tracks compliance across all your repos — no config files, no arguments.</text>

  <!-- Primary CTA button -->
  <rect x="348" y="484" width="296" height="52" rx="8" fill="#4F46E5"/>
  <text x="496" y="516" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Start free — sign in with GitHub</text>

  <!-- Secondary CTA button -->
  <rect x="660" y="484" width="192" height="52" rx="8" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="756" y="516" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#9CA3AF">See how it works</text>

  <!-- Fine print -->
  <text x="600" y="576" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4B5563">Free tier included · $29/month for unlimited · No credit card to start</text>

  <!-- Bottom border line -->
  <line x1="0" y1="620" x2="1200" y2="620" stroke="#1E2733" stroke-width="1"/>

  <!-- Vignette -->
  <rect width="1200" height="675" fill="url(#vignette)"/>
</svg>
